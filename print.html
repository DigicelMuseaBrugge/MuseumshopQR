<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print Ticket</title>
  <link rel="stylesheet" href="print.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="screen-toolbar">
  <button onclick="window.print()">Afdrukken</button>
</div>

<div id="labels"></div>

<script>
const container = document.getElementById("labels");

let stored = null;

try {
  stored = JSON.parse(sessionStorage.getItem("printData"));
} catch (error) {
  stored = null;
}

function createLabel(ticket) {
  const page = document.createElement("div");
  page.className = "page";

  const label = document.createElement("div");
  label.className = "label";

  const qr = document.createElement("div");
  qr.className = "qr";

  const priceWrap = document.createElement("div");
  priceWrap.className = "vertical-block";

  const price = document.createElement("div");
  price.className = "price";
  price.textContent = "€ " + Number(ticket.prijs).toFixed(2);
  priceWrap.appendChild(price);

  const codeWrap = document.createElement("div");
  codeWrap.className = "vertical-block";

  const code = document.createElement("div");
  code.className = "code";
  code.textContent = ticket.artikelcode;
  codeWrap.appendChild(code);

  label.appendChild(qr);
  label.appendChild(priceWrap);
  label.appendChild(codeWrap);

  page.appendChild(label);
  container.appendChild(page);

  new QRCode(qr, {
    text: ticket.artikelcode,
    width: 120,
    height: 120,
    correctLevel: QRCode.CorrectLevel.M
  });
}

if (!stored || !Array.isArray(stored.tickets) || stored.tickets.length === 0) {
  const error = document.createElement("p");
  error.className = "error-message";
  error.textContent = "Geen geldige printdata gevonden.";
  container.appendChild(error);
} else {
  stored.tickets.forEach(ticket => {
    const aantal = Number(ticket.aantal);

    if (!ticket.artikelcode || isNaN(ticket.prijs) || isNaN(aantal) || aantal < 1) {
      return;
    }

    for (let i = 0; i < aantal; i++) {
      createLabel(ticket);
    }
  });
}
</script>

</body>
</html>
