<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print Ticket</title>
  <link rel="stylesheet" href="print.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="screen-toolbar">
  <button onclick="window.print()">Afdrukken</button>
</div>

<div id="labels"></div>

<script>
const container = document.getElementById("labels");

let stored = null;

try {
  stored = JSON.parse(sessionStorage.getItem("printData"));
} catch (error) {
  stored = null;
}

function truncateText(text, maxLength = 32) {
  if (!text) return "";
  const str = String(text).trim();
  return str.length > maxLength ? str.slice(0, maxLength - 1) + "…" : str;
}

function formatPrice(value) {
  const amount = Number(value || 0);
  return "€ " + amount.toFixed(2);
}

function createLabel(ticket) {
  const page = document.createElement("div");
  page.className = "page";

  const label = document.createElement("div");
  label.className = "label";

  const qrBox = document.createElement("div");
  qrBox.className = "qr-box";

  const qr = document.createElement("div");
  qr.className = "qr";
  qrBox.appendChild(qr);

  const priceBox = document.createElement("div");
  priceBox.className = "price-box";

  const price = document.createElement("div");
  price.className = "price vertical-text";
  price.textContent = formatPrice(ticket.prijs);
  priceBox.appendChild(price);

  const codeBox = document.createElement("div");
  codeBox.className = "code-box";

  const code = document.createElement("div");
  code.className = "code vertical-text";
  code.textContent = truncateText(ticket.artikelcode, 32);
  codeBox.appendChild(code);

  label.appendChild(qrBox);
  label.appendChild(priceBox);
  label.appendChild(codeBox);

  page.appendChild(label);
  container.appendChild(page);

  new QRCode(qr, {
    text: ticket.qrText || ticket.artikelcode,
    width: 110,
    height: 110,
    correctLevel: QRCode.CorrectLevel.M
  });
}

if (!stored || !Array.isArray(stored.tickets) || stored.tickets.length === 0) {
  const error = document.createElement("p");
  error.className = "error-message";
  error.textContent = "Geen geldige printdata gevonden.";
  container.appendChild(error);
} else {
  stored.tickets.forEach(ticket => {
    const aantal = Number(ticket.aantal);

    if (!ticket.artikelcode || isNaN(ticket.prijs) || isNaN(aantal) || aantal < 1) {
      return;
    }

    for (let i = 0; i < aantal; i++) {
      createLabel(ticket);
    }
  });
}
</script>

</body>
</html>
