<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Print</title>
<link rel="stylesheet" href="print.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

<button onclick="window.print()">Print</button>

<div id="labels"></div>

<script>

const container = document.getElementById("labels");

let data;

try {
  data = JSON.parse(sessionStorage.getItem("printData"));
} catch {
  data = null;
}

if(!data){
  container.innerHTML = "Geen data";
} else {

  data.forEach(ticket => {

    for(let i=0;i<ticket.aantal;i++){

      const page = document.createElement("div");
      page.className = "page";

      const qr = document.createElement("div");
      new QRCode(qr, ticket.artikelcode);

      const price = document.createElement("div");
      price.textContent = "€ " + ticket.prijs.toFixed(2);

      const code = document.createElement("div");
      code.textContent = ticket.artikelcode;

      page.appendChild(qr);
      page.appendChild(price);
      page.appendChild(code);

      container.appendChild(page);
    }

  });

}

</script>

</body>
</html>
