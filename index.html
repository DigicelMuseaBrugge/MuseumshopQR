<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musea Brugge | QR Ticket Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="page-shell">

<nav class="navbar">
  <div class="nav-left">
    <div class="brand-mark">MB</div>
    <div class="brand-text">
      <span class="brand-top">Musea Brugge</span>
      <span class="brand-bottom">QR Ticket Generator</span>
    </div>
  </div>
</nav>

<main class="main-grid">

<section class="panel input-panel">

  <div class="field-group">
    <label>Tekst / artikelcode</label>
    <input id="search" type="text">
  </div>

  <div class="field-group">
    <label>Prijs</label>
    <input id="prijs" type="number" value="2.00">
  </div>

  <div class="field-group">
    <label>Aantal</label>
    <input id="aantal" type="number" value="1">
  </div>

  <div class="button-group">
    <button id="printButton" class="print-btn">Afdrukken</button>
  </div>

  <!-- Excel upload (simpel zoals screenshot) -->
  <div class="help-box">
    <strong>Excel upload</strong>

    <input id="excelFile" type="file" accept=".xlsx,.xls,.csv">

    <div id="uploadStatus" class="upload-status">
      Geen bestand geladen. Je kan ook nog altijd manueel één ticket invullen.
    </div>
  </div>

</section>

</main>

</div>

<script>

const excelFile = document.getElementById("excelFile");
let importedTickets = [];

/* Excel upload */
excelFile.addEventListener("change", function(e){

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(evt){

    const data = new Uint8Array(evt.target.result);
    const workbook = XLSX.read(data, {type:'array'});

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet);

    importedTickets = rows.map(r => ({
      artikelcode: r.artikelcode || r.Artikelcode,
      prijs: Number(r.prijs || r.Prijs),
      aantal: Number(r.aantal || r.Aantal || 1)
    })).filter(r => r.artikelcode);

    document.getElementById("uploadStatus").textContent =
      importedTickets.length + " rijen geladen";

  };

  reader.readAsArrayBuffer(file);
});

/* print */
document.getElementById("printButton").onclick = function(){

  if(importedTickets.length > 0){
    sessionStorage.setItem("printData", JSON.stringify(importedTickets));
  }

  window.open("print.html", "_blank");
};

</script>

</body>
</html>
